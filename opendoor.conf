[general]

# Target host or IP <string>
host = example.com

# Target scheme: http:// or https:// <string>
scheme = http://

# Use SSL mode.
# Keep it aligned with scheme:
# - scheme=http://  -> ssl=False, port=80
# - scheme=https:// -> ssl=True,  port=443
ssl = False

# Custom port <int>
port = 80

# HTTP method.
# HEAD is faster, but body-dependent sniffers/filters force GET internally.
method = HEAD

# Delay between threaded requests in seconds.
# Wizard currently parses integers safely, so prefer 0,1,2... here.
delay = 0

# Request timeout in seconds <int>
timeout = 30

# Max retries to reconnect <int>
retries = 3

# Use keep-alive connection.
# IMPORTANT for wizard: use True to enable, None to disable.
# Do not use False here, current BrowserConfig treats non-None as enabled.
keep_alive = None

# Accept and route cookies from responses.
# IMPORTANT for wizard: use True to enable, None to disable.
# Do not use False here, current BrowserConfig treats non-None as enabled.
accept_cookies = None

# Detect probable CMS, framework, platform or custom stack before scan <bool>
fingerprint = False

# Passively detect probable WAF / anti-bot protections <bool>
waf_detect = False

# Enable cautious WAF-aware runtime profile.
# Automatically enables WAF detection inside BrowserConfig.
waf_safe_mode = False

# Use built-in proxy list <bool>
tor = False

# Path to custom proxy list <string|None>
torlist = None

# Custom permanent proxy server.
# Format: http://ip:port, https://ip:port, socks4://ip:port, socks5://ip:port
proxy = None

# Randomize User-Agent per request <bool>
random_agent = False

# Debug level: -1 silent, 0 off, 1-3 verbose <int>
debug = 0

# Allowed worker threads <int>
threads = 1

# Response sniff plugins.
# Supported examples:
# - indexof
# - collation
# - file
# - skipempty
# - skipsizes=46
# - skipsizes=46:1024
# Multiple: skipempty,collation,indexof
sniff = None

# Scan type: directories or subdomains <string>
scan = directories

# Path to custom wordlist <string|None>
wordlist = None

# Shuffle scan list.
# IMPORTANT for wizard: use True to enable, None to disable.
# Do not use False here, current BrowserConfig treats non-None as enabled.
random_list = None

# Append path prefix to scan host.
# Example: admin, api/v1, app/
prefix = None

# Force selected extensions for directory scan.
# Example: php,json,txt
extensions = None

# Ignore selected extensions for directory scan.
# Example: aspx,jsp,do
ignore_extensions = None

# Enable recursive directory scan <bool>
recursive = False

# Maximum recursive scan depth <int>
recursive_depth = 1

# HTTP statuses allowed for recursive expansion <string>
recursive_status = 200,301,302,307,308,403

# File extensions excluded from recursive expansion <string>
recursive_exclude = jpg,jpeg,png,gif,svg,css,js,ico,woff,woff2,ttf,map,pdf,zip,gz,tar

# Scan reports.
# Supported: json,std,txt,csv,html,sqlite
# For CSV reporter check use: std,csv
reports = std,csv

# Path to custom reports directory <string|None>
reports_dir = None

# Persist scan state to checkpoint file.
# Sessions currently support one target per run.
session_save = None

# Resume scan from checkpoint file.
# If set, session params override host/scan settings.
session_load = None

# Autosave session checkpoint every N seconds <int>
session_autosave_sec = 20

# Autosave session checkpoint after N processed items <int>
session_autosave_items = 200

# Include only response codes.
# Example: 200-299,301,302,403
include_status = None

# Exclude response codes.
# Example: 404,429,500-599
exclude_status = None

# Exclude exact response sizes in bytes.
# Example: 0,1234
exclude_size = None

# Exclude response size ranges in bytes.
# Example: 0-256,1024-2048
exclude_size_range = None

# Keep only responses whose body contains this text.
# Body-dependent filter: HEAD will be overridden to GET.
match_text = None

# Exclude responses whose body contains this text.
# Body-dependent filter: HEAD will be overridden to GET.
exclude_text = None

# Keep only responses whose body matches this regex.
# Body-dependent filter: HEAD will be overridden to GET.
match_regex = None

# Exclude responses whose body matches this regex.
# Body-dependent filter: HEAD will be overridden to GET.
exclude_regex = None

# Keep only responses whose size is at least N bytes <int|None>
min_response_length = None

# Keep only responses whose size is at most N bytes <int|None>
max_response_length = None